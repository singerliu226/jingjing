<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>菁菁小画桌</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="service-gate" id="service-gate" hidden>
      <div class="service-gate-panel">
        <h2>请从服务版打开小画桌</h2>
        <p>图片分析和千问对话需要本地服务支持。直接打开 HTML 文件会让这些能力不稳定。</p>
        <a href="http://localhost:4174/">打开 http://localhost:4174/</a>
      </div>
    </div>
    <div class="app-shell">
      <aside class="sidebar" aria-label="项目与视图">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M8 5.5h8l2.5 2.7v8.3l-2.5 2.7H8l-2.5-2.7V8.2L8 5.5Z"/><path d="M9 11.2h.1M15 11.2h.1M9.5 15c1.4 1 3.6 1 5 0"/></svg>
          </div>
          <div>
            <h1>菁菁小画桌</h1>
            <p>菁菁的设计工作小助理</p>
          </div>
        </div>

        <button class="primary-action" id="new-project-btn" type="button">
          <span aria-hidden="true">+</span>
          新建项目
        </button>

        <section class="sidebar-section">
          <div class="section-title">
            <h2>项目</h2>
            <button class="icon-button" id="sort-projects-btn" title="按风险和截止时间排序" type="button">
              <svg viewBox="0 0 24 24"><path d="M7 6h10M10 12h7M13 18h4M5 6h.01M5 12h.01M5 18h.01"/></svg>
            </button>
          </div>
          <div class="filter-tabs" role="tablist" aria-label="项目筛选">
            <button class="filter-tab is-active" data-filter="all" type="button">全部</button>
            <button class="filter-tab" data-filter="active" type="button">进行中</button>
            <button class="filter-tab" data-filter="waiting" type="button">待确认</button>
            <button class="filter-tab" data-filter="done" type="button">已完成</button>
          </div>
          <div class="project-list" id="project-list"></div>
        </section>

      </aside>

      <main class="workspace">
        <section class="project-header">
          <div>
            <div class="project-kicker" id="active-project-type">视觉设计 · 进行中</div>
            <h2 id="active-project-name">品牌升级 · 青禾咖啡</h2>
          </div>
          <button class="detail-toggle" id="detail-toggle" type="button">项目详情</button>
        </section>

        <div class="content-grid app-view is-active" id="workbench-view">
          <section class="chat-panel conversation-panel" aria-label="和小画桌对话">
            <div class="conversation-head">
              <div>
                <h3>菁菁，和小画桌慢慢说</h3>
                <p>这个项目的要求、卡住的地方、老板的反馈，都可以直接丢给我。我会结合右侧项目详情来回答。</p>
              </div>
            </div>

            <div class="chat-stream compact-stream" id="chat-stream" aria-live="polite"></div>

            <div class="prompt-strip" aria-label="可以这样问">
              <button class="prompt-chip" data-template="这个项目我应该先从哪里开始？" type="button">先从哪里开始？</button>
              <button class="prompt-chip" data-template="老板说画面不够高级，我应该怎么改？" type="button">老板说不够高级</button>
              <button class="prompt-chip" data-template="帮我把这个需求拆成今天能做的任务。" type="button">拆成今天任务</button>
              <button class="prompt-chip" data-template="交付前我需要确认哪些尺寸和格式？" type="button">交付前确认什么？</button>
            </div>

            <div class="attachment-dock" id="attachment-dock" aria-live="polite"></div>
            <form class="composer" id="composer">
              <input id="attachment-input" type="file" accept="image/*,.txt,.md,.csv,.json" multiple hidden />
              <button class="attach-button" id="attach-button" type="button" title="上传图片或文件">
                <svg viewBox="0 0 24 24"><path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l10-10a4 4 0 0 1 5.7 5.7L9.1 18.3a2 2 0 1 1-2.8-2.8l9.3-9.3"/></svg>
              </button>
              <textarea id="message-input" rows="2" placeholder="输入问题，或上传设计图让我看。比如：这张海报哪里不够高级？"></textarea>
              <button class="send-button" type="submit" title="发送">
                <svg viewBox="0 0 24 24"><path d="M21 3 10 14M21 3l-7 18-4-7-7-4z"/></svg>
              </button>
            </form>
          </section>

          <aside class="work-rail" aria-label="项目详情">
            <section class="rail-card project-detail-card" aria-label="项目详情">
              <div class="rail-card-head project-detail-head">
                <div>
                  <h3>项目详情</h3>
                  <p>从聊天里自动补齐，菁菁只改不准的地方。</p>
                </div>
                <button class="context-status" id="save-project-btn" type="button">等待识别</button>
              </div>
              <form class="project-form detail-form" id="project-form">
                <label class="primary-field">项目<input id="project-name-input" type="text" /></label>
                <div class="form-row">
                  <label>DDL<input id="project-due-input" type="date" /></label>
                  <label>进度
                    <select id="project-status-input">
                      <option value="todo">未开始</option>
                      <option value="designing">设计中</option>
                      <option value="waiting">待确认</option>
                      <option value="done">已完成</option>
                    </select>
                  </label>
                </div>
                <label>交付物<input id="project-deliverables-input" type="text" placeholder="例如：海报、包装、公众号头图" /></label>
                <label>设计要求<textarea id="project-requirements-input" rows="4" placeholder="小画桌会从对话里提取：使用场景、必须出现的信息、风格偏好、禁用元素..."></textarea></label>
                <label>当前进度<textarea id="project-progress-input" rows="3" placeholder="做到哪一步了？等谁确认？下一步卡在哪里？"></textarea></label>
                <details class="detail-more">
                  <summary>更多项目信息</summary>
                  <label>设计类型<input id="project-type-input" type="text" placeholder="海报 / 品牌 / 社媒图 / 包装" /></label>
                  <label>核心目标<textarea id="project-goal-input" rows="3" placeholder="这次要解决什么？谁看？希望对方做什么？"></textarea></label>
                </details>
              </form>
              <div class="detail-section">
                <div class="panel-heading">
                  <h3>下一步 <span id="today-count">0</span></h3>
                  <button class="text-button" id="add-task-btn" type="button">添加</button>
                </div>
                <div class="project-task-list" id="project-task-list"></div>
              </div>
              <button class="danger-line-button" id="delete-project-btn" type="button">删除这个项目</button>
              <span class="hidden-flow" id="waiting-count">0</span>
              <div class="hidden-flow" id="waiting-list"></div>
              <div class="hidden-flow" id="next-list"></div>
              <div class="hidden-flow" id="risk-list"></div>
            </section>
          </aside>
        </div>
      </main>
    </div>
    <button class="detail-fab" id="detail-fab" type="button">项目详情</button>
    <div class="rail-backdrop" id="rail-backdrop"></div>

    <template id="message-template">
      <article class="message">
        <div class="avatar"></div>
        <div class="message-body">
          <div class="message-meta"></div>
          <div class="bubble"></div>
        </div>
      </article>
    </template>

    <script src="core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
